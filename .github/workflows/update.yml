name: Update Regime Monitor

on:
  schedule:
    # 23:30 UTC = 01:30 deutsche Zeit (Sommerzeit) bzw. 00:30 (Winterzeit)
    # Laeuft Di-Sa: deckt die US-Handelstage Mo-Fr ab (Schlusskurse des Vortags)
    - cron: '30 23 * * 2-6'
  workflow_dispatch:  # erlaubt manuelles Triggern aus dem Actions-Tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run update
        run: python update.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto-update regime data'
          file_pattern: 'index.html regime_data.csv'
